<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>
  <h1>My Habits</h1>
  <a href="/stats.html">📊 View My Stats</a>

  <form action="/habits/add" method="POST">
    <input type="text" name="name" placeholder="New habit name" required />
    <button type="submit">Add Habit</button>
  </form>

  <ul id="habits-list"></ul>

  <script>
    async function loadHabits() {
      const habits = await fetch('/habits').then(r => r.json());
      const logs = await fetch('/logs/today').then(r => r.json());
      const loggedIds = logs.map(l => l.habit_id);

      const list = document.getElementById('habits-list');
      list.innerHTML = '';
      habits.forEach(habit => {
        const done = loggedIds.includes(habit.id);
        list.innerHTML += `
          <li>
            <strong>${habit.name}</strong>
            🔥 Streak: ${habit.streak} days
            ${done ? '✅ Done today!' : ''}
            ${!done ? `
              <form action="/logs/check/${habit.id}" method="POST" style="display:inline">
                <button type="submit">Check in</button>
              </form>` : ''}
            <form action="/habits/delete/${habit.id}" method="POST" style="display:inline">
              <button type="submit">Delete</button>
            </form>
          </li>`;
      });
    }
    loadHabits();
  </script>
</body>
</html>
